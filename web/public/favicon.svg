<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 16x16 placeholder pixel-art "DNG" mark in NES green on indigo. -->
  <rect width="16" height="16" fill="#0F0F1B"/>
  <!-- D -->
  <rect x="2" y="4" width="1" height="8" fill="#7CB342"/>
  <rect x="2" y="4" width="3" height="1" fill="#7CB342"/>
  <rect x="2" y="11" width="3" height="1" fill="#7CB342"/>
  <rect x="5" y="5" width="1" height="6" fill="#7CB342"/>
  <!-- accent dot -->
  <rect x="13" y="11" width="2" height="2" fill="#FFCB05"/>
  <!-- "GO" pixel -->
  <rect x="8" y="5" width="3" height="6" fill="none" stroke="#7CB342" stroke-width="0.5"/>
</svg>
